# =============================================================
#  CI/CD 파이프라인 (GitHub Actions) — 안전 버전 (검증된 v4 액션)
# -------------------------------------------------------------
#  특징:
#   - 잠금 파일(package-lock.json)이 없어도 실패하지 않습니다.
#   - Node.js 프로젝트가 아니면 해당 단계를 자동으로 건너뜁니다.
#   - 처음 실행에서 정상 동작이 확인된 v4 액션만 사용합니다.
#
#  위치: 저장소의 .github/workflows/ci.yml
# =============================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================
  #  CI: 검사 + 테스트 + 빌드 (없으면 건너뜀)
  # =============================================================
  build-and-test:
    name: 빌드 및 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # Node.js 설치 (캐시 옵션은 잠금 파일이 없으면 에러가 나므로 넣지 않음)
      #  ▶ 다른 언어라면 이 단계를 교체하세요:
      #     - Python:  uses: actions/setup-python@v5  (with: python-version: '3.12')
      #     - Java:    uses: actions/setup-java@v4    (with: distribution: 'temurin', java-version: '21')
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 의존성 설치 — 상황에 맞춰 자동 분기 (없으면 그냥 통과)
      - name: 의존성 설치
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json 발견 -> npm ci 실행"
            npm ci
          elif [ -f package.json ]; then
            echo "package.json만 있음 -> npm install 실행"
            npm install
          else
            echo "package.json이 없어 설치 단계를 건너뜁니다 (Node.js 프로젝트가 아님)."
          fi

      # 검사 / 테스트 / 빌드 — package.json이 있을 때만, 스크립트가 있으면 실행
      - name: 검사 / 테스트 / 빌드
        run: |
          if [ -f package.json ]; then
            npm run lint --if-present
            npm test --if-present
            npm run build --if-present
          else
            echo "Node.js 프로젝트가 아니어서 검사 단계를 건너뜁니다."
          fi

      # 빌드 결과물이 있을 때만 저장 (없으면 무시, 실패하지 않음)
      - name: 빌드 산출물 업로드
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist
          if-no-files-found: ignore

  # =============================================================
  #  CD: 배포 (대상이 정해지면 여기를 채웁니다)
  # -------------------------------------------------------------
  #  지금은 자리만 잡아 두었고, 항상 성공하도록 안내 문구만 출력합니다.
  #  - main 브랜치 push 이고, 위 CI가 성공했을 때만 실행됩니다.
  # =============================================================
  deploy:
    name: 배포
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # ▼▼▼ 배포 대상이 정해지면 이 자리(echo)를 실제 배포 명령으로 교체하세요 ▼▼▼
      #  [Vercel / Netlify]  보통 서비스의 GitHub 연동만으로 자동 배포됨 (이 잡이 불필요할 수 있음)
      #  [AWS S3] 예시:  aws s3 sync ./dist s3://버킷이름 --delete  (자격증명 설정 후)
      #  [Docker]  docker build/push  (레지스트리 로그인 후)
      #  ※ 토큰/키는 저장소 Settings -> Secrets and variables -> Actions 에 등록해 사용
      # ▲▲▲ 여기까지 ▲▲▲
      - name: 배포 자리 표시(임시)
        run: echo "배포 대상이 정해지면 위 주석을 참고해 이 단계를 실제 배포 명령으로 교체하세요."
