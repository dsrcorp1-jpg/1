# =============================================================
#  CI/CD 파이프라인 (GitHub Actions) — Node.js 기준 시작 템플릿
# -------------------------------------------------------------
#  사용법:
#   1) 이 파일을 저장소 안 .github/workflows/ci.yml 위치에 넣으세요.
#   2) main 브랜치에 push 하거나 Pull Request를 만들면 자동 실행됩니다.
#   3) 다른 언어/배포 대상은 아래 주석 안내대로 바꾸면 됩니다.
# =============================================================

name: CI/CD

# ---------------------------------------------------------------
# 언제 실행할지(트리거)
#  - main 브랜치로 코드가 들어올 때(push)
#  - main 으로 향하는 Pull Request가 열릴 때
# ---------------------------------------------------------------
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동시에 같은 브랜치가 여러 번 실행되면 이전 실행을 취소(자원 절약)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================
  #  1) CI: 검사 + 테스트 + 빌드
  # =============================================================
  build-and-test:
    name: 빌드 및 테스트
    runs-on: ubuntu-latest

    steps:
      # 저장소 코드를 가져옵니다
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # Node.js 설치 (+ npm 캐시로 설치 속도 향상)
      #  ▶ 다른 언어라면 이 단계를 교체하세요:
      #     - Python:  uses: actions/setup-python@v5  (with: python-version: '3.12')
      #     - Java:    uses: actions/setup-java@v4    (with: distribution: 'temurin', java-version: '21')
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 의존성 설치 (package-lock.json 기준으로 정확히 설치)
      - name: 의존성 설치
        run: npm ci

      # 린트(코드 스타일 검사) — 스크립트가 없으면 건너뜀
      - name: 린트
        run: npm run lint --if-present

      # 테스트 — 스크립트가 없으면 건너뜀
      - name: 테스트
        run: npm test --if-present

      # 빌드 — 스크립트가 없으면 건너뜀
      - name: 빌드
        run: npm run build --if-present

      # 빌드 결과물을 다음 단계(배포)로 넘기기 위해 저장
      #  ▶ 'dist' 폴더명은 프로젝트에 맞게 바꾸세요(예: build, out)
      - name: 빌드 산출물 업로드
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist
          if-no-files-found: ignore

  # =============================================================
  #  2) CD: 배포 (대상이 정해지면 채우는 자리)
  # -------------------------------------------------------------
  #  - main 브랜치에 push 됐고, 위 CI가 성공했을 때만 실행됩니다.
  #  - 지금은 배포 대상이 미정이라 '예시 자리'만 비워 두었습니다.
  # =============================================================
  deploy:
    name: 배포
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: 빌드 산출물 내려받기
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      # ▼▼▼ 배포 대상이 정해지면 이 부분만 채우면 됩니다 ▼▼▼
      #
      #  [Vercel / Netlify]  보통 각 서비스의 GitHub 연동만으로 자동 배포되어
      #                      이 deploy 잡 자체가 필요 없을 수도 있습니다.
      #
      #  [AWS S3 정적 사이트] 예시:
      #    - name: AWS 자격증명 설정
      #      uses: aws-actions/configure-aws-credentials@v4
      #      with:
      #        aws-region: ap-northeast-2
      #        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      #    - name: S3 업로드
      #      run: aws s3 sync ./dist s3://내-버킷-이름 --delete
      #
      #  [Docker / Kubernetes] 예시:
      #    - name: 도커 이미지 빌드 & 푸시
      #      run: |
      #        docker build -t my-app:${{ github.sha }} .
      #        echo "${{ secrets.REGISTRY_TOKEN }}" | docker login -u 사용자 --password-stdin
      #        docker push my-app:${{ github.sha }}
      #
      #  ※ 비밀 값(토큰/키)은 코드에 직접 쓰지 말고
      #     저장소 Settings → Secrets and variables → Actions 에 등록해
      #     ${{ secrets.이름 }} 형태로 불러오세요.
      #
      # ▲▲▲ 여기까지 ▲▲▲
      - name: 배포 자리 표시(임시)
        run: echo "배포 대상이 정해지면 위 주석을 참고해 이 단계를 교체하세요."
